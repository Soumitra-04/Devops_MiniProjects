services:

  backend:
    build: ./backend

    environment:
      DB_HOST: db
      DB_NAME: mydb
      DB_USER: postgres
      DB_PASSWORD: postgres

    depends_on:
      - db

  db:
    image: postgres:16

    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:latest

    ports:
      - "8080:80"

    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - backend

volumes:
  postgres_data: